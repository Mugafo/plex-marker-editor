# Run from repo root: `docker compose up --build`
#
# API: do NOT mount `./api:/app` — that replaces the image’s `node_modules` (linux) with the host tree
# (often no `node_modules` in git). Mount only `src` + manifests so `node_modules` stays from the image
# (`RUN npm install` in api/Dockerfile.dev). After changing api/package.json: `docker compose build api`
#
# --- Published ports (host → avoid clashes with other stacks) ---
# Default UI:  http://localhost:5174  (same port inside the web container — open this URL on your machine)
# Default API: http://localhost:3101  (same port inside the api container: 3101 → 3101)
# Optional `.env` overrides:
#   WEB_HOST_PORT=5174
#   API_HOST_PORT=3101
#
# --- Plex library database ---
# Host folder → `/data` in the API container. Set `PLEX_DATA_HOST_PATH` in `.env` to any folder on your machine
# (same as `docker run -v /host/path:/data`). Default is `./data` at the repo root.
# Put `com.plexapp.plugins.library.db` (and any `.db-wal` / `.db-shm`) in that folder while Plex is stopped.
# `PLEX_DB_PATH` is the file path *inside the container* (usually under `/data/...`).
# On Windows + Docker Desktop, prefer forward slashes for absolute paths, e.g. `F:/Plex/.../Databases`.
# Stop Plex before copying or editing the live DB.

services:
  api:
    init: true
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    ports:
      - "${API_HOST_PORT:-3101}:3101"
    environment:
      PORT: "3101"
      PLEX_DB_PATH: ${PLEX_DB_PATH:-/data/com.plexapp.plugins.library.db}
    volumes:
      - ./api/src:/app/src
      - ./api/package.json:/app/package.json
      - ./api/tsconfig.json:/app/tsconfig.json
      - ${PLEX_DATA_HOST_PATH:-./data}:/data

  web:
    init: true
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    ports:
      - "${WEB_HOST_PORT:-5174}:5174"
    depends_on:
      - api
    environment:
      # Must match api container listen port (3101).
      VITE_API_PROXY_TARGET: http://api:3101
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      - ./frontend:/app
      - web_node_modules:/app/node_modules

volumes:
  web_node_modules:
